version: "3.9"
services:
  mysql:
    image: mariadb:10.4.28
    #Uncomment below when on Mac M1
    # platform: linux/arm64/v8
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      # PMA_USER: root
      # PMA_PASSWORD: root
  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

